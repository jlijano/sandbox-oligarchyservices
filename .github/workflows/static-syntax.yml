name: Static syntax validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax:
    name: Validate static and PHP syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check HTML and XML parsing
        shell: bash
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import sys
          import xml.etree.ElementTree as ET

          class Parser(HTMLParser):
              pass

          failures = []
          for path in sorted(Path('.').glob('*.html')):
              try:
                  Parser().feed(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  failures.append(f'{path}: {exc}')

          for path in [Path('sitemap.xml')]:
              if path.exists():
                  try:
                      ET.parse(path)
                  except Exception as exc:
                      failures.append(f'{path}: {exc}')

          if failures:
              print('\n'.join(failures))
              sys.exit(1)
          PY

      - name: Check JavaScript syntax
        shell: bash
        run: |
          find assets automation -type f -name '*.js' -print0 2>/dev/null | xargs -0 -r -n 1 node --check

      - name: Check PHP syntax
        shell: bash
        run: |
          find . -path './vendor' -prune -o -path './node_modules' -prune -o -type f -name '*.php' -print0 | xargs -0 -r -n 1 php -l
