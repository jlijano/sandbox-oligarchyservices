name: Validate site availability

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: validate-site-availability
  cancel-in-progress: false

jobs:
  repository:
    name: Repository reference checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate local public references
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlsplit, unquote
          import re
          import sys

          root = Path.cwd()
          source_suffixes = {'.html', '.php'}
          checked_attributes = {'href', 'src', 'action', 'poster'}
          skipped_dirs = {
              '.git', '.github', 'docs', 'node_modules', 'vendor',
              'uploads', 'storage', 'tmp', 'cache', '.sentinel'
          }
          generated_allowlist = {
              '/includes/config.php',
              '/includes/installed.lock',
              '/oligarchy-config.php',
          }
          runtime_allowlist = {
              '/privacy.html#analytics-opt-out',
          }
          external_schemes = {'http', 'https', 'mailto', 'tel', 'sms', 'javascript', 'data'}

          class RefParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.refs = []

              def handle_starttag(self, tag, attrs):
                  for name, value in attrs:
                      if name in checked_attributes and value:
                          self.refs.append(value.strip())

          def iter_sources():
              for path in root.rglob('*'):
                  if not path.is_file():
                      continue
                  if any(part in skipped_dirs for part in path.parts):
                      continue
                  if path.suffix.lower() in source_suffixes:
                      yield path

          def normalize_url(raw):
              if not raw or raw.startswith('#'):
                  return None
              parsed = urlsplit(raw)
              if parsed.scheme.lower() in external_schemes or parsed.netloc:
                  return None
              path = unquote(parsed.path or '')
              if not path or path.startswith('#'):
                  return None
              if path in runtime_allowlist:
                  return None
              return path

          def candidate_paths(source, url_path):
              if url_path == '/':
                  return [root / 'index.html']
              if url_path.startswith('/'):
                  relative = url_path.lstrip('/')
              else:
                  relative = str((source.parent / url_path).relative_to(root))
              base = root / relative
              candidates = [base]
              if url_path.endswith('/'):
                  candidates.append(base / 'index.html')
              if base.suffix == '':
                  candidates.extend([base / 'index.html', base.with_suffix('.html'), base.with_suffix('.php')])
              return candidates

          def ref_exists(source, url_path):
              if url_path in generated_allowlist:
                  return True
              return any(candidate.exists() for candidate in candidate_paths(source, url_path))

          failures = []
          for source in iter_sources():
              text = source.read_text(encoding='utf-8', errors='ignore')
              parser = RefParser()
              parser.feed(text)
              refs = list(parser.refs)
              refs.extend(re.findall(r"url\(['\"]?([^)'\"]+)", text))
              for raw in refs:
                  url_path = normalize_url(raw)
                  if url_path is None:
                      continue
                  if not ref_exists(source, url_path):
                      failures.append(f"{source.relative_to(root)} -> {raw}")

          if failures:
              print('Broken local references found:')
              for failure in failures:
                  print(f' - {failure}')
              sys.exit(1)

          print('Local public references are valid.')
          PY

  availability:
    name: Production availability diagnostics
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://sandbox.oligarchyservices.com
    steps:
      - name: Check public and protected routes
        shell: bash
        run: |
          set -euo pipefail

          temp_files=()
          cleanup() {
            rm -f "${temp_files[@]}"
          }
          trap cleanup EXIT

          diagnose_request() {
            local path="$1"
            local host
            host="${BASE_URL#https://}"
            host="${host#http://}"
            host="${host%%/*}"

            echo "DNS lookup for ${host}:" >&2
            getent hosts "$host" >&2 || true
            echo "TLS/header probe for ${BASE_URL}${path}:" >&2
            curl --verbose --head --location --connect-timeout 10 --max-time 20 "${BASE_URL}${path}" >&2 || true
          }

          request() {
            local path="$1"
            local expected_status="$2"
            local output_file
            local status
            local curl_exit
            output_file="$(mktemp)"
            temp_files+=("$output_file")

            set +e
            status="$(curl --silent --show-error --location --connect-timeout 10 --max-time 30 --retry 2 --retry-delay 3 --retry-connrefused --retry-all-errors --output "$output_file" --write-out "%{http_code}" "${BASE_URL}${path}")"
            curl_exit=$?
            set -e
            echo "${path} -> HTTP ${status:-000} (curl exit ${curl_exit})" >&2

            if (( curl_exit != 0 )); then
              echo "::warning::curl failed while checking ${path}. Treating this as runner/network diagnostic evidence, not proof that production is down." >&2
              diagnose_request "$path"
              printf '%s' "$output_file"
              return 2
            fi

            if [[ "$status" != "$expected_status" ]]; then
              echo "Expected ${path} to return HTTP ${expected_status}, got HTTP ${status}." >&2
              echo "Response preview:" >&2
              head -c 500 "$output_file" >&2 || true
              echo >&2
              diagnose_request "$path"
              if [[ "$status" == "403" && "$expected_status" != "403" ]]; then
                echo "::warning::Public route returned 403 to this GitHub runner. This may be host/WAF/proxy blocking and needs browser or Hostinger-side verification." >&2
                printf '%s' "$output_file"
                return 2
              fi
              return 1
            fi

            printf '%s' "$output_file"
            return 0
          }

          soft_failures=0

          home_file=""
          if ! home_file="$(request "/" "200")"; then
            code=$?
            if (( code == 2 )); then soft_failures=$((soft_failures + 1)); else exit "$code"; fi
          fi
          robots_file=""
          if ! robots_file="$(request "/robots.txt" "200")"; then
            code=$?
            if (( code == 2 )); then soft_failures=$((soft_failures + 1)); else exit "$code"; fi
          fi
          sitemap_file=""
          if ! sitemap_file="$(request "/sitemap.xml" "200")"; then
            code=$?
            if (( code == 2 )); then soft_failures=$((soft_failures + 1)); else exit "$code"; fi
          fi
          dynamic_sitemap_file=""
          if ! dynamic_sitemap_file="$(request "/sitemap.php" "200")"; then
            code=$?
            if (( code == 2 )); then soft_failures=$((soft_failures + 1)); else exit "$code"; fi
          fi
          login_file=""
          if ! login_file="$(request "/login.html" "200")"; then
            code=$?
            if (( code == 2 )); then soft_failures=$((soft_failures + 1)); else exit "$code"; fi
          fi
          request "/includes/" "403" >/dev/null || exit $?
          request "/includes/config.php" "403" >/dev/null || exit $?
          request "/includes/bootstrap.php" "403" >/dev/null || exit $?

          if (( soft_failures > 0 )); then
            echo "::warning::Production availability checks produced ${soft_failures} runner/network diagnostics. Verify from a browser or Hostinger-side logs before declaring production unavailable." >&2
            exit 0
          fi

          grep -qi "Oligarchy Services" "$home_file" || { echo "Homepage did not contain expected brand text."; exit 1; }
          grep -q "Sitemap: ${BASE_URL}/sitemap.xml" "$robots_file" || { echo "robots.txt did not reference the expected static sitemap URL."; exit 1; }
          grep -q "Sitemap: ${BASE_URL}/sitemap.php" "$robots_file" || { echo "robots.txt did not reference the expected dynamic sitemap URL."; exit 1; }
          grep -q "<loc>${BASE_URL}/</loc>" "$sitemap_file" || { echo "sitemap.xml did not include the homepage URL."; exit 1; }
          grep -q "<loc>${BASE_URL}/blogs.php</loc>" "$dynamic_sitemap_file" || { echo "sitemap.php did not include the blog listing URL."; exit 1; }
          grep -qi "Client Login\|Log in" "$login_file" || { echo "login.html did not contain expected login page text."; exit 1; }
