name: Validate site availability

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: validate-site-availability
  cancel-in-progress: false

jobs:
  availability:
    name: Production availability checks
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://sandbox.oligarchyservices.com
    steps:
      - name: Check public and protected routes
        shell: bash
        run: |
          set -euo pipefail

          temp_files=()
          cleanup() {
            rm -f "${temp_files[@]}"
          }
          trap cleanup EXIT

          diagnose_request() {
            local path="$1"
            local host
            host="${BASE_URL#https://}"
            host="${host#http://}"
            host="${host%%/*}"

            echo "DNS lookup for ${host}:" >&2
            getent hosts "$host" >&2 || true
            echo "TLS/header probe for ${BASE_URL}${path}:" >&2
            curl --verbose --head --location --connect-timeout 10 --max-time 20 "${BASE_URL}${path}" >&2 || true
          }

          request() {
            local path="$1"
            local expected_status="$2"
            local output_file
            local status
            local curl_exit
            output_file="$(mktemp)"
            temp_files+=("$output_file")

            set +e
            status="$(curl --silent --show-error --location --connect-timeout 10 --max-time 30 --retry 2 --retry-delay 3 --retry-connrefused --retry-all-errors --output "$output_file" --write-out "%{http_code}" "${BASE_URL}${path}")"
            curl_exit=$?
            set -e
            echo "${path} -> HTTP ${status:-000} (curl exit ${curl_exit})" >&2

            if (( curl_exit != 0 )); then
              echo "curl failed while checking ${path}." >&2
              diagnose_request "$path"
              exit 1
            fi

            if [[ "$status" != "$expected_status" ]]; then
              echo "Expected ${path} to return HTTP ${expected_status}, got HTTP ${status}." >&2
              echo "Response preview:" >&2
              head -c 500 "$output_file" >&2 || true
              echo >&2
              diagnose_request "$path"
              exit 1
            fi

            printf '%s' "$output_file"
          }

          home_file="$(request "/" "200")"
          robots_file="$(request "/robots.txt" "200")"
          sitemap_file="$(request "/sitemap.xml" "200")"
          dynamic_sitemap_file="$(request "/sitemap.php" "200")"
          login_file="$(request "/login.html" "200")"
          request "/includes/" "403" >/dev/null
          request "/includes/config.php" "403" >/dev/null
          request "/includes/bootstrap.php" "403" >/dev/null

          grep -qi "Oligarchy Services" "$home_file" || { echo "Homepage did not contain expected brand text."; exit 1; }
          grep -q "Sitemap: ${BASE_URL}/sitemap.xml" "$robots_file" || { echo "robots.txt did not reference the expected static sitemap URL."; exit 1; }
          grep -q "Sitemap: ${BASE_URL}/sitemap.php" "$robots_file" || { echo "robots.txt did not reference the expected dynamic sitemap URL."; exit 1; }
          grep -q "<loc>${BASE_URL}/</loc>" "$sitemap_file" || { echo "sitemap.xml did not include the homepage URL."; exit 1; }
          grep -q "<loc>${BASE_URL}/blogs.php</loc>" "$dynamic_sitemap_file" || { echo "sitemap.php did not include the blog listing URL."; exit 1; }
          grep -qi "Client Login\|Log in" "$login_file" || { echo "login.html did not contain expected login page text."; exit 1; }
